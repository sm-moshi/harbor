# Harbor Go components — build verification pipeline
# Runs on push/PR to sm-moshi/v2.15 branch
#
# Verifies the 4 Go components compile successfully. Full go vet is not
# possible without swagger-generated code (server/v2.0/{models,restapi})
# which requires `make gen_apis` and isn't checked in.
#
# Go module cache persisted via S3 (Garage) between runs.
when:
  - event: [push, pull_request]
    branch: sm-moshi/v2.15

steps:
  - name: restore-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "harbor-go-{{ checksum \"src/go.sum\" }}"
      mount:
        - .go-mod-cache

  - name: generate-swagger
    image: golang:1.25.7
    environment:
      GOMODCACHE: /woodpecker/src/github.com/sm-moshi/harbor/.go-mod-cache
    commands:
      - go install github.com/go-swagger/go-swagger/cmd/swagger@v0.33.1
      - swagger generate server
        --template-dir=tools/swagger/templates
        --exclude-main
        --additional-initialism=CVE
        --additional-initialism=GC
        --additional-initialism=OIDC
        -f api/v2.0/swagger.yaml
        -A harbor
        --target src/server/v2.0

  - name: build-check
    image: golang:1.25.7
    environment:
      GOMODCACHE: /woodpecker/src/github.com/sm-moshi/harbor/.go-mod-cache
    commands:
      - cd src
      - echo "Building core..."
      - CGO_ENABLED=0 go build -o /dev/null ./core
      - echo "Building jobservice..."
      - CGO_ENABLED=0 go build -o /dev/null ./jobservice
      - echo "Building registryctl..."
      - CGO_ENABLED=0 go build -o /dev/null ./registryctl
      - echo "Building exporter..."
      - CGO_ENABLED=0 go build -o /dev/null ./cmd/exporter
      - echo "All 4 components compile successfully."

  - name: rebuild-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "harbor-go-{{ checksum \"src/go.sum\" }}"
      mount:
        - .go-mod-cache
    when:
      - status: [success, failure]
