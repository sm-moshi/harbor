# Harbor Go source — lint pipeline
# Runs on push/PR to sm-moshi/v2.15 branch
when:
- event: [push, pull_request]
  branch: sm-moshi/v2.15

steps:
- name: go-vet
  image: golang:1.25.7
  commands:
  - cd src && go vet ./...

- name: staticcheck
  image: golang:1.25.7
  commands:
  - go install honnef.co/go/tools/cmd/staticcheck@latest
  - cd src && staticcheck $(go list ./... | grep -v '\.pb\.go')
