# Harbor Go source — lint pipeline
# Runs on push/PR to sm-moshi/v2.15 branch
#
# NOTE: server/v2.0/{models,restapi} are swagger-generated and not checked in.
# Exclude ./server/... from linting to avoid missing module errors.
when:
  - event: [push, pull_request]
    branch: sm-moshi/v2.15

steps:
  - name: go-vet
    image: golang:1.25.7
    commands:
      - cd src && go vet $(go list ./... | grep -v '/server/')

  - name: staticcheck
    image: golang:1.25.7
    commands:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - cd src && staticcheck $(go list ./... | grep -v -e '\.pb\.go' -e '/server/')
